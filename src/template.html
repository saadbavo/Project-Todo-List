<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
</head>
<body>
    <div id="header">
        <h1 class="title">Todo List App</h1>
    </div>
    <div id="main">
        <div id="project">
            <div class="list-container"></div>
            <div class="add-list-container">
                <button class="btn-add-list">+</button>
                <input type="text" placeholder="List name" class="list-name">
            </div>
        </div>
        <div id="todo">
            <div id="todo-header"></div>
            <div class="add-task-container"></div>
            <div class="tasks-container"></div>
        </div>
    </div>
</body>
</html>
